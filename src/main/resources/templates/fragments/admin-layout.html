<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="adminHead">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị - BookStore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <!-- ===== SIDEBAR ===== -->
    <div th:fragment="sidebar" class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <span class="sidebar-brand">BookStore</span>
            <small class="sidebar-subtitle">Bảng Quản Trị</small>
        </div>
        <nav class="sidebar-nav">
            <a th:href="@{/admin}" class="sidebar-link" id="link-dashboard">
                <span class="sidebar-icon"><i class="bi bi-speedometer2"></i></span> Tổng quan
            </a>
            <a th:href="@{/admin/books}" class="sidebar-link" id="link-books">
                <span class="sidebar-icon"><i class="bi bi-journal-bookmark"></i></span> Quản lý sách
            </a>
            <a th:href="@{/admin/categories}" class="sidebar-link" id="link-categories">
                <span class="sidebar-icon"><i class="bi bi-tags"></i></span> Danh mục
            </a>
            <a th:href="@{/admin/orders}" class="sidebar-link" id="link-orders">
                <span class="sidebar-icon"><i class="bi bi-receipt"></i></span> Đơn hàng
            </a>
            <a th:href="@{/admin/users}" class="sidebar-link" id="link-users">
                <span class="sidebar-icon"><i class="bi bi-people"></i></span> Người dùng
            </a>
            <a th:href="@{/admin/coupons}" class="sidebar-link" id="link-coupons">
                <span class="sidebar-icon"><i class="bi bi-ticket-perforated"></i></span> Mã giảm giá
            </a>
            <hr class="sidebar-divider">
            <a th:href="@{/}" class="sidebar-link sidebar-link-secondary">
                <span class="sidebar-icon"><i class="bi bi-arrow-left"></i></span> Về trang chủ
            </a>
            <form th:action="@{/logout}" method="post" class="px-3 mt-2">
                <button type="submit" class="btn btn-outline-light btn-sm w-100">Đăng xuất</button>
            </form>
        </nav>
        <div class="sidebar-footer">
            <small>Xin chào, <span sec:authentication="name">Admin</span></small>
        </div>
    </div>

    <!-- ===== TOP BAR ===== -->
    <div th:fragment="topbar" class="admin-topbar">
        <button class="btn btn-sm btn-outline-secondary d-lg-none" onclick="toggleSidebar()">
            <i class="bi bi-list"></i> Menu
        </button>
        <div class="topbar-right">
            <span class="topbar-user">
                <span sec:authentication="name">Admin</span>
                <span class="badge bg-danger ms-1">ADMIN</span>
            </span>
        </div>
    </div>
</body>

</html>
