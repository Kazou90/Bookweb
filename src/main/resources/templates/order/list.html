<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container mt-4">
        <div class="page-header">
            <div>
                <h2><i class="bi bi-receipt-cutoff"></i> Lịch sử đơn hàng</h2>
                <p class="text-muted">Danh sách các đơn hàng bạn đã đặt</p>
            </div>
        </div>

        <!-- Danh sách đơn hàng -->
        <div th:if="${!#lists.isEmpty(orders)}">
            <div class="table-wrapper">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Mã ĐH</th>
                            <th>Tên khách hàng</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th>Ngày đặt</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td><span class="badge bg-primary" th:text="'#' + ${order.id}">ID</span></td>
                            <td th:text="${order.customerName}">Tên</td>
                            <td>
                                <strong class="text-success"
                                    th:text="${order.totalPrice != null ? #numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫' : '0 ₫'}">
                                    0 ₫</strong>
                            </td>
                            <td>
                                <span th:if="${order.status == 'PENDING'}" class="badge bg-warning text-dark">Chờ thanh toán</span>
                                <span th:if="${order.status == 'PAID'}" class="badge bg-success">Đã thanh toán</span>
                                <span th:if="${order.status == 'SHIPPING'}" class="badge bg-info">Đang giao</span>
                                <span th:if="${order.status == 'COMPLETED'}" class="badge bg-primary">Hoàn thành</span>
                                <span th:if="${order.status == 'CANCELLED'}" class="badge bg-danger">Đã hủy</span>
                                <span th:if="${order.status == null}" class="badge bg-secondary">N/A</span>
                            </td>
                            <td
                                th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : 'N/A'}">
                                Ngày</td>
                            <td>
                                <a th:href="@{'/orders/' + ${order.id}}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye"></i> Chi tiết
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Chưa có đơn hàng -->
        <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
            <i class="bi bi-inbox" style="font-size: 3rem; color: var(--text-muted);"></i>
            <h4 class="mt-3 text-muted">Bạn chưa có đơn hàng nào</h4>
            <p class="text-muted">Hãy khám phá kho sách và đặt hàng ngay!</p>
            <a th:href="@{/books}" class="btn btn-accent mt-2">
                <i class="bi bi-search"></i> Khám phá kho sách
            </a>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: notifScript}"></script>
</body>

</html>
