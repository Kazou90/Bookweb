<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/admin-layout :: adminHead}"></head>

<body>
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>
    <div th:replace="~{fragments/admin-layout :: topbar}"></div>

    <div class="admin-content">
        <div class="admin-page-header">
            <h3><i class="bi bi-plus-circle"></i> Thêm danh mục mới</h3>
            <p>Tạo danh mục mới cho sách</p>
        </div>

        <div class="admin-card" style="max-width:600px;">
            <div class="admin-card-header">
                <h5>Thông tin danh mục</h5>
            </div>
            <div class="p-4">
                <form th:action="@{/admin/categories/add}" th:object="${category}" method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Tên danh mục <span class="text-danger">*</span></label>
                        <input type="text" id="name" th:field="*{name}" class="form-control"
                            th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                            placeholder="Nhập tên danh mục">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-admin-primary"><i class="bi bi-check-lg"></i> Lưu</button>
                        <a th:href="@{/admin/categories}" class="btn btn-outline-secondary"><i
                                class="bi bi-arrow-left"></i> Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('adminSidebar').classList.toggle('show');
        }
        document.getElementById('link-categories').classList.add('active');
    </script>
</body>

</html>
