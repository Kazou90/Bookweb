<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container mt-4">
        <div class="page-header">
            <h2><i class="bi bi-cart3"></i> Giỏ hàng của bạn</h2>
            <a th:href="@{/books}" class="btn btn-outline-custom"><i class="bi bi-arrow-left"></i> Tiếp tục mua</a>
        </div>
        <div th:if="${#lists.isEmpty(cart)}">
            <div class="alert alert-custom-info"><i class="bi bi-info-circle-fill"></i> Giỏ hàng của bạn đang trống. <a
                    th:href="@{/books}" class="alert-link fw-bold">Duyệt sách ngay</a></div>
        </div>
        <div th:unless="${#lists.isEmpty(cart)}" class="row">
            <div class="col-lg-8">
                <div class="table-custom">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Đơn giá</th>
                                <th>Số lượng</th>
                                <th>Thành tiền</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${cart}">
                                <td><strong th:text="${item.book.title}"></strong><br><small class="text-muted"
                                        th:text="${item.book.author}"></small></td>
                                <td th:text="${#numbers.formatDecimal(item.book.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                </td>
                                <td>
                                    <form th:action="@{'/cart/update/' + ${item.book.id}}" method="post"
                                        class="d-flex align-items-center gap-1">
                                        <input type="number" name="quantity" th:value="${item.quantity}" min="1"
                                            max="99" style="width:65px" class="form-control form-control-sm">
                                        <button type="submit" class="btn btn-sm btn-outline-custom"><i
                                                class="bi bi-arrow-repeat"></i></button>
                                    </form>
                                </td>
                                <td class="price-tag"
                                    th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                </td>
                                <td><a th:href="@{'/cart/remove/' + ${item.book.id}}"
                                        class="btn btn-sm btn-danger btn-sm-action"><i class="bi bi-x-lg"></i></a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="cart-summary">
                    <h5><i class="bi bi-receipt-cutoff"></i> Tóm tắt đơn hàng</h5>
                    <hr>
                    <div class="d-flex justify-content-between mb-2"><span class="total-label">Số lượng sản
                            phẩm:</span><strong th:text="${count}"></strong></div>
                    <div class="d-flex justify-content-between mb-3"><span class="total-label">Tổng cộng:</span><span
                            class="total-value"
                            th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span></div>
                    <a th:href="@{/cart/checkout}" class="btn btn-accent w-100 mb-2"><i
                            class="bi bi-credit-card-2-front"></i> Thanh toán</a>
                    <a th:href="@{/cart/clear}" class="btn btn-outline-danger w-100"
                        onclick="return confirm('Xóa toàn bộ giỏ hàng?')"><i class="bi bi-trash3"></i> Xóa giỏ hàng</a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: notifScript}"></script>
</body>

</html>
