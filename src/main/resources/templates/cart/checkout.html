<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container mt-4">
        <div class="page-header">
            <h2><i class="bi bi-credit-card-2-front"></i> Thanh toán</h2>
        </div>

        <!-- Thông báo mã giảm giá đang có -->
        <div th:if="${!#lists.isEmpty(activeCoupons)}" class="coupon-banner mb-4">
            <div class="coupon-banner-header">
                <i class="bi bi-gift-fill"></i> Khuyến mãi đang diễn ra!
            </div>
            <div class="coupon-banner-body">
                <div th:each="coupon : ${activeCoupons}" class="coupon-item">
                    <div class="coupon-code-display">
                        <span class="coupon-code-text" th:text="${coupon.code}">CODE</span>
                    </div>
                    <div class="coupon-detail">
                        <strong th:text="'Giảm ' + ${coupon.discountPercent} + '%'">Giảm</strong>
                        <span th:if="${coupon.maxDiscount != null}"
                            th:text="' (tối đa ' + ${#numbers.formatDecimal(coupon.maxDiscount, 0, 'COMMA', 0, 'POINT')} + ' ₫)'"></span>
                        <br>
                        <small class="text-muted" th:text="${coupon.description}">Mô tả</small>
                        <br th:if="${coupon.minOrderAmount != null}">
                        <small th:if="${coupon.minOrderAmount != null}" class="text-muted"
                            th:text="'Đơn tối thiểu: ' + ${#numbers.formatDecimal(coupon.minOrderAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></small>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-7">
                <div class="card-custom p-4">
                    <h5 class="fw-bold text-primary mb-3"><i class="bi bi-truck"></i> Thông tin giao hàng</h5>
                    <form th:action="@{/payment/checkout}" method="post" class="form-custom">
                        <div class="mb-3">
                            <label for="customerName" class="form-label">Họ và tên <span
                                    class="text-danger">*</span></label>
                            <input type="text" id="customerName" name="customerName" class="form-control" required
                                placeholder="Nhập họ và tên người nhận">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">Số điện thoại</label>
                                <input type="text" id="phone" name="phone" class="form-control"
                                    placeholder="0xxx xxx xxx">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" name="email" class="form-control"
                                    placeholder="email@example.com">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">Địa chỉ giao hàng</label>
                            <textarea id="address" name="address" class="form-control" rows="3"
                                placeholder="Nhập địa chỉ giao hàng chi tiết"></textarea>
                        </div>

                        <!-- Ô nhập mã giảm giá -->
                        <div class="mb-3">
                            <label for="couponCode" class="form-label">
                                <i class="bi bi-ticket-perforated"></i> Mã giảm giá
                            </label>
                            <div class="input-group">
                                <input type="text" id="couponCode" name="couponCode" class="form-control"
                                    placeholder="Nhập mã giảm giá (nếu có)" style="text-transform: uppercase;">
                                <span class="input-group-text bg-warning text-dark">
                                    <i class="bi bi-tag-fill"></i>
                                </span>
                            </div>
                            <small class="text-muted">Nhập mã giảm giá để được ưu đãi khi thanh toán</small>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-accent">
                                <i class="bi bi-qr-code-scan"></i> Thanh toán bằng QR Code
                            </button>
                            <a th:href="@{/cart}" class="btn btn-outline-custom">
                                <i class="bi bi-arrow-left"></i> Quay lại giỏ hàng
                            </a>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="cart-summary">
                    <h5><i class="bi bi-bag-check"></i> Đơn hàng của bạn</h5>
                    <hr>
                    <table class="table table-sm mb-3">
                        <thead>
                            <tr>
                                <th>Sách</th>
                                <th class="text-center">SL</th>
                                <th class="text-end">Tiền</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${cart}">
                                <td><small th:text="${item.book.title}"></small></td>
                                <td class="text-center" th:text="${item.quantity}"></td>
                                <td class="text-end price-tag"
                                    th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold">Tổng thanh toán:</span>
                        <span class="total-value"
                            th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                    </div>

                    <div class="mt-3 p-3 bg-light rounded small">
                        <i class="bi bi-shield-check text-success"></i>
                        <strong>Thanh toán an toàn</strong> qua chuyển khoản ngân hàng bằng mã QR.
                        Đơn hàng sẽ được xác nhận tự động sau khi nhận tiền.
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: notifScript}"></script>
</body>

</html>
