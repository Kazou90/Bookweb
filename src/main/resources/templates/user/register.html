<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container mt-4">
        <div class="auth-card">
            <h2><i class="bi bi-person-plus-fill"></i> Đăng ký tài khoản</h2>
            <form th:action="@{/register}" th:object="${user}" method="post" class="form-custom">
                <div class="mb-3"><label for="username" class="form-label">Tên đăng nhập <span
                            class="text-danger">*</span></label><input type="text" id="username" th:field="*{username}"
                        class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                        placeholder="Ít nhất 3 ký tự">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                    </div>
                </div>
                <div class="mb-3"><label for="password" class="form-label">Mật khẩu <span
                            class="text-danger">*</span></label><input type="password" id="password"
                        th:field="*{password}" class="form-control"
                        th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" placeholder="Ít nhất 6 ký tự">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                    </div>
                </div>
                <div class="mb-3"><label for="email" class="form-label">Email</label><input type="email" id="email"
                        th:field="*{email}" class="form-control"
                        th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="example@email.com">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="mb-3"><label for="phone" class="form-label">Số điện thoại</label><input type="text"
                        id="phone" th:field="*{phone}" class="form-control" placeholder="0xxx xxx xxx"></div>
                <button type="submit" class="btn btn-accent w-100 py-2"><i class="bi bi-person-plus"></i> Đăng
                    ký</button>
            </form>
            <p class="text-center mt-3 mb-0" style="font-size:0.9rem;">Đã có tài khoản? <a th:href="@{/login}"
                    class="fw-bold" style="color:var(--primary)">Đăng nhập</a></p>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
