<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container mt-4">
        <div class="auth-card">
            <h2><i class="bi bi-box-arrow-in-right"></i> Đăng nhập</h2>
            <div class="alert alert-custom-danger" th:if="${param.error}"><i
                    class="bi bi-exclamation-triangle-fill"></i> Tên đăng nhập hoặc mật khẩu không đúng.</div>
            <div class="alert alert-custom-success" th:if="${param.logout}"><i class="bi bi-check-circle-fill"></i> Bạn
                đã đăng xuất thành công.</div>
            <div class="alert alert-custom-success" th:if="${param.registered}"><i class="bi bi-check-circle-fill"></i>
                Đăng ký thành công! Vui lòng đăng nhập.</div>
            <form th:action="@{/login}" method="post" class="form-custom">
                <div class="mb-3"><label for="username" class="form-label">Tên đăng nhập</label><input type="text"
                        id="username" name="username" class="form-control" required autofocus
                        placeholder="Nhập tên đăng nhập"></div>
                <div class="mb-3"><label for="password" class="form-label">Mật khẩu</label><input type="password"
                        id="password" name="password" class="form-control" required placeholder="Nhập mật khẩu"></div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2"><i class="bi bi-box-arrow-in-right"></i>
                    Đăng nhập</button>
            </form>
            <p class="text-center mt-3 mb-0" style="font-size:0.9rem;">Chưa có tài khoản? <a th:href="@{/register}"
                    class="fw-bold" style="color:var(--primary)">Đăng ký ngay</a></p>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
