<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container mt-4">
        <div class="page-header">
            <h2><i class="bi bi-plus-circle"></i> Thêm sách mới</h2>
        </div>
        <div class="card-custom p-4">
            <form th:action="@{/books/add}" th:object="${book}" method="post" enctype="multipart/form-data"
                class="form-custom">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="title" class="form-label">Tiêu đề sách <span class="text-danger">*</span></label>
                        <input type="text" id="title" th:field="*{title}" class="form-control"
                            th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                            placeholder="Nhập tiêu đề sách">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="author" class="form-label">Tác giả</label>
                        <input type="text" id="author" th:field="*{author}" class="form-control"
                            th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'"
                            placeholder="Nhập tên tác giả">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="price" class="form-label">Giá bán (VNĐ) <span class="text-danger">*</span></label>
                        <input type="number" id="price" th:field="*{price}" class="form-control" step="1000"
                            th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'" placeholder="0">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="category" class="form-label">Danh mục</label>
                        <select id="category" th:field="*{category}" class="form-select">
                            <option value="">— Chọn danh mục —</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="imageFile" class="form-label">Ảnh bìa sách</label>
                        <input type="file" id="imageFile" name="imageFile" class="form-control" accept="image/*">
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary-custom"><i class="bi bi-check-lg"></i> Lưu
                        sách</button>
                    <a th:href="@{/admin/books}" class="btn btn-outline-custom"><i class="bi bi-arrow-left"></i> Quay
                        lại</a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
