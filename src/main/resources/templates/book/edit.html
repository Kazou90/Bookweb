<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container mt-4">
        <div class="page-header">
            <h2><i class="bi bi-pencil-square"></i> Chỉnh sửa sách</h2>
        </div>
        <div class="card-custom p-4">
            <form th:action="@{/books/edit}" th:object="${book}" method="post" enctype="multipart/form-data"
                class="form-custom">
                <input type="hidden" th:field="*{id}"><input type="hidden" th:field="*{image}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="title" class="form-label">Tiêu đề sách <span class="text-danger">*</span></label>
                        <input type="text" id="title" th:field="*{title}" class="form-control"
                            th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="author" class="form-label">Tác giả</label>
                        <input type="text" id="author" th:field="*{author}" class="form-control"
                            th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="price" class="form-label">Giá bán (VNĐ) <span class="text-danger">*</span></label>
                        <input type="number" id="price" th:field="*{price}" class="form-control" step="1000"
                            th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="category" class="form-label">Danh mục</label>
                        <select id="category" th:field="*{category}" class="form-select">
                            <option value="">— Chọn danh mục —</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${book.category != null && book.category.id == cat.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Ảnh bìa</label>
                        <div th:if="${book.image != null}" class="mb-2"><img th:src="@{'/images/' + ${book.image}}"
                                class="book-image" alt="Ảnh hiện tại"></div>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                        <small class="text-muted">Để trống nếu không đổi ảnh</small>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary-custom"><i class="bi bi-check-lg"></i> Cập
                        nhật</button>
                    <a th:href="@{/admin/books}" class="btn btn-outline-custom"><i class="bi bi-arrow-left"></i> Quay
                        lại</a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
