<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container mt-4">
        <div class="page-header">
            <h2><i class="bi bi-plus-circle"></i> Thêm danh mục mới</h2>
        </div>
        <div class="card-custom p-4" style="max-width:500px;">
            <form th:action="@{/categories/add}" th:object="${category}" method="post" class="form-custom">
                <div class="mb-3"><label for="name" class="form-label">Tên danh mục <span
                            class="text-danger">*</span></label><input type="text" id="name" th:field="*{name}"
                        class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                        placeholder="Nhập tên danh mục">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="d-flex gap-2"><button type="submit" class="btn btn-primary-custom"><i
                            class="bi bi-check-lg"></i> Lưu</button><a th:href="@{/admin/categories}"
                        class="btn btn-outline-custom"><i class="bi bi-arrow-left"></i> Quay lại</a></div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
